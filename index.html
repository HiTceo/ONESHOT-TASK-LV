<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn App</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; background: linear-gradient(to bottom, #ffcccc, #cce5ff); }

        #loading {
            text-align: center; font-size: 20px; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #loading h2 { margin: 10px; font-size: 28px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .spinner { border: 6px solid rgba(255,255,255,0.3); border-top: 6px solid white; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { display: flex; align-items: center; padding: 10px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); box-shadow: 0 4px 10px rgba(0,0,0,0.1); justify-content: space-between; }
        #profile-pic { width: 30px; height: 30px; background: #ccc; border-radius: 50%; margin: 0 5px; background-size: cover; }
        .wallet { background: #6a1b9a; padding: 8px 15px; border-radius: 15px; color: white; font-size: 18px; font-weight: 500; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .wallet-icon { margin-right: 8px; }

        .task-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 15px; margin: 0 auto; max-width: 320px; }
        .task-btn { width: 45%; padding: 15px; background: linear-gradient(45deg, #00bfff, #1e90ff); color: white; border: none; border-radius: 12px; margin: 8px; font-size: 16px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; }
        .task-btn:active { transform: scale(0.95); }

        .social-row { text-align: center; padding: 15px; color: #2c3e50; font-size: 16px; font-weight: 500; }
        .social-icons img { width: 35px; margin: 0 8px; transition: transform 0.2s; }
        .social-icons img:hover { transform: scale(1.1); }

        .footer-credit { text-align: center; padding: 10px 15px 20px; font-size: 12px; }
        .footer-link { text-decoration: none; color: #555; font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s, text-shadow 0.2s; font-family: 'Courier New', monospace; }
        .footer-link:hover { color: #6a1b9a; text-shadow: 0 0 8px rgba(106, 27, 154, 0.4); }
        .footer-link:active { transform: scale(0.98); }

        /* ===== NEW BOTTOM NAV BAR ===== */
        .nav-container {
            display: none;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #faf8f5;
            padding: 10px 0 14px 0;
            box-shadow: 0 -1px 12px rgba(0,0,0,0.08);
            z-index: 1000;
            border-top: 1px solid #ede9e3;
            box-sizing: border-box;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 0;
            gap: 4px;
            transition: opacity 0.2s;
        }
        .nav-btn:active { opacity: 0.7; }
        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke: #999;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s;
        }
        .nav-btn span {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .nav-btn.active svg { stroke: #ff6b6b; }
        .nav-btn.active span { color: #ff6b6b; }

        .page { display: none; padding-bottom: 70px; height: 100vh; overflow-y: auto; box-sizing: border-box; }

        /* Refer Page */
        #refer-page { background: #0b0714; color: #fff; }
        .refer-dark-header { text-align: center; margin-bottom: 25px; padding-top: 20px; }
        .neon-text { margin: 0; font-size: 28px; font-weight: bold; background: linear-gradient(90deg, #ff7eb3, #bf55ec, #7be1ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .refer-dark-header p { color: #a39eb8; font-size: 14px; margin-top: 8px; }

        .refer-dark-card { background: #1a162b; border: 1px solid #2d2446; border-radius: 16px; padding: 20px; margin: 0 15px 15px 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .refer-link-label-dark { font-size: 14px; color: #d1cadd; margin-bottom: 10px; }
        .refer-link-input-wrapper { display: flex; align-items: center; background: #0b0714; border: 1px solid #3d325c; border-radius: 10px; padding: 12px 15px; margin-bottom: 15px; overflow: hidden; }
        .link-icon { color: #bf55ec; margin-right: 10px; font-size: 18px; }
        .refer-link-dark { color: #a39eb8; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .refer-action-buttons { display: flex; gap: 12px; }
        .btn-copy-dark, .btn-share-dark { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.2s; }
        .btn-copy-dark:active, .btn-share-dark:active { transform: scale(0.95); }
        .btn-copy-dark { background: linear-gradient(135deg, #7a28cb, #4a1c73); border: 1px solid #6a1b9a; }
        .btn-share-dark { background: linear-gradient(135deg, #3b5998, #1e3c72); border: 1px solid #2a317d; }

        .refer-stats-row { display: flex; gap: 15px; margin: 0 15px 20px 15px; }
        .refer-stat-card { flex: 1; background: #1a162b; border: 1px solid #2d2446; border-radius: 16px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .stat-icon-wrap { width: 45px; height: 45px; border-radius: 50%; background: rgba(191, 85, 236, 0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-blue .stat-icon-wrap { background: rgba(123, 225, 255, 0.1); }
        .stat-title { font-size: 12px; color: #a39eb8; }
        .stat-value { font-size: 22px; font-weight: bold; color: #fff; margin: 2px 0; }
        .stat-sub { font-size: 11px; color: #7d7596; }

        .refer-dark-list-container { background: #1a162b; border: 1px solid #2d2446; border-radius: 16px; padding: 20px; margin: 0 15px 30px 15px; }
        .list-title { margin: 0 0 15px 0; font-size: 16px; color: #fff; font-weight: 500; }
        .dark-referral-list { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .dark-referral-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2d2446; }
        .dark-referral-item:last-child { border-bottom: none; }
        .dark-ref-avatar { width: 35px; height: 35px; background: #4a1c73; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .dark-ref-userid { font-size: 14px; font-weight: 500; color: #e4e0ec; margin-bottom: 3px; }
        .dark-ref-date { font-size: 11px; color: #7d7596; }
        .dark-ref-amt { font-size: 15px; font-weight: bold; color: #28a745; }

        /* Withdraw */
        .withdraw-options { display: flex; flex-wrap: wrap; justify-content: center; }
        .withdraw-option { width: 45%; padding: 12px; background: linear-gradient(45deg, #00bfff, #1e90ff); color: white; border: none; border-radius: 12px; margin: 8px; font-size: 16px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; }
        .withdraw-option:active { transform: scale(0.95); }
        #withdraw-btn { background: gray; color: black; padding: 15px; width: 90%; margin: 20px auto; display: block; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; transition: transform 0.2s; cursor: pointer; }
        #withdraw-btn:active { transform: scale(0.95); }
        #error-msg { color: red; text-align: center; }
        .min-label { color: #999; font-size: 12px; text-align: center; }

        /* Task Pages */
        .task-page-header { display: flex; align-items: center; padding: 15px; background: linear-gradient(135deg, #ffcccc, #cce5ff); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { background: #ff4500; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; transition: transform 0.2s; cursor: pointer; }
        .back-btn:active { transform: scale(0.95); }
        .task-item { display: flex; align-items: center; padding: 15px; background: #fff; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .task-item:hover { transform: translateY(-2px); }

        .task-icon { width: 40px; height: 40px; margin-right: 12px; border-radius: 8px; object-fit: contain; }

        .task-title { flex: 1; font-size: 16px; color: #333; }
        .task-meta { font-size: 12px; color: #666; margin-top: 4px; display: block; }
        .play-btn, .check-btn { background: linear-gradient(45deg, #ff6b6b, #ff8e53); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; transition: transform 0.2s; cursor: pointer; }
        .play-btn:active, .check-btn:active { transform: scale(0.95); }
        .check-spinner { display: none; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-left: 10px; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 5px; z-index: 100000; display: none; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -50px; } to { top: 20px; } }

        /* Profile Page */
        #profile-page { background: #f4f6f9; }
        .profile-header-card { text-align: center; padding: 20px; padding-top: 10px; }
        .top-bar-profile { display: flex; justify-content: flex-start; padding: 15px; }
        .profile-pic-wrap { width: 90px; height: 90px; border-radius: 50%; background: #2c3e50; margin: 0 auto 10px; border: 3px solid #6a1b9a; overflow: hidden; }
        .profile-pic-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name-lg { font-size: 22px; font-weight: bold; color: #333; }
        .profile-id-sm { font-size: 14px; color: #666; margin-top: 5px; }

        .balance-card { background: linear-gradient(135deg, #4b134f, #c94b4b); margin: 0 15px 15px; border-radius: 15px; padding: 20px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .balance-label { font-size: 14px; opacity: 0.8; margin-bottom: 5px; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 0; }

        .action-card { background: white; margin: 0 15px 12px; border-radius: 12px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .action-card:active { transform: scale(0.98); }

        .history-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #333; }

        #osc-file-input { display: none; }

        .preview-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid #eee; }

        .file-upload-btn-new:active { background: #d2e3fc; }
        .submit-proof-btn { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3); transition: transform 0.2s; cursor: pointer; }
        .submit-proof-btn:active { transform: scale(0.98); }

        /* OSC Task Link Row */
        .osc-link-row {
            display: flex; align-items: center; gap: 8px; margin-top: 12px;
            background: #f0f2f5; border-radius: 10px; padding: 10px 12px;
            border: 1px solid #e1e4e8;
        }
        .osc-link-text {
            flex: 1; font-size: 12px; color: #555; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .osc-link-copy-btn {
            background: #e8f0fe; color: #1a73e8; border: none; padding: 7px 12px;
            border-radius: 7px; font-size: 12px; font-weight: bold; cursor: pointer;
            white-space: nowrap; transition: background 0.2s;
        }
        .osc-link-copy-btn:active { background: #d2e3fc; }
        .osc-link-open-btn {
            background: linear-gradient(45deg, #00bfff, #1e90ff); color: white; border: none;
            padding: 7px 12px; border-radius: 7px; font-size: 12px; font-weight: bold;
            cursor: pointer; white-space: nowrap; transition: transform 0.2s;
        }
        .osc-link-open-btn:active { transform: scale(0.95); }

        /* Upload progress */
        .upload-progress-bar-wrap {
            width: 100%; background: #e0e0e0; border-radius: 8px;
            margin-top: 10px; display: none; overflow: hidden;
        }
        .upload-progress-bar {
            height: 8px; background: linear-gradient(45deg, #1a73e8, #00bfff);
            border-radius: 8px; width: 0%; transition: width 0.3s;
        }
        .upload-status-text {
            font-size: 12px; color: #666; text-align: center;
            margin-top: 5px; display: none;
        }

        /* Guide Page */
        #guide-page { background: #f4f6f9; }
        .guide-btn-open {
            display: block; width: 80%; margin: 15px auto 5px; padding: 12px;
            background: linear-gradient(45deg, #00bfff, #1e90ff); color: white;
            text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .guide-btn-open:active { transform: scale(0.95); }
